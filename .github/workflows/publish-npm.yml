name: Publish Packages to NPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build packages
      run: pnpm build

    - name: Publish to NPM
      run: |
        pnpm --filter @fidel-tools/core publish --no-git-checks
        pnpm --filter @fidel-tools/lang-am publish --no-git-checks
        pnpm --filter @fidel-tools/validate-pack publish --no-git-checks
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
